# Alpha Omega Collective — Gig Playlists
# Rebuilds the gig index from sets/ and deploys to GitHub Pages on every push.
# The workflow: you add a set-sheet HTML to sets/ and push. Done.
name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; let the newest push win.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build gig index (assets/gigs.js)
        run: python build_gigs.py

      - uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
