<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>New Set — ΑΩ Collective (template — copy me)</title>
<meta name="theme-color" content="#0E0E10">

<!-- ============================================================================
  AO-GIG  ·  machine-readable header the hub (../index.html) reads to build the
  gig card.  KEEP this block valid JSON between the AO-GIG / AO-GIG markers.
  Edit these fields per gig. "channel" = lime | cobalt | orange | magenta | teal | violet.
  "status" = upcoming | past  (the hub also auto-derives from "date" vs today).
============================================================================= -->
<!--AO-GIG
{"title":"New Set — Title Here","venue":"Venue name","city":"Kuala Lumpur","date":"2026-09-01","status":"upcoming","channel":"lime","genre":"Melodic / Organic House & Techno","tracks":0,"bpmRange":[120,130],"duration":"~2 hours","vibes":["Vibe One","Vibe Two","Vibe Three"]}
AO-GIG-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Fraunces:ital,opsz,wght@1,9,400;1,9,500&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230E0E10'/%3E%3Ctext x='16' y='23' font-family='monospace' font-size='18' font-weight='700' text-anchor='middle' fill='%23FF2E9A'%3E%CE%91%CE%A9%3C/text%3E%3C/svg%3E">
<style>
  :root{
    /* — Alpha Omega Collective tokens — */
    --bg:#0E0E10; --panel:#17171B; --panel2:#1F1F26; --well:#121216; --line:#2A2A32;
    --ink:#F4F4F0; --muted:#8A8A98; --faint:#63636F;
    --cyan:#00DCFF; --mag:#FF288F;                 /* fixed glitch pair */
    /* channels */
    --lime:#C6F000; --cobalt:#3E6BFF; --orange:#FF5A2C; --magenta:#FF2E9A; --teal:#7EE8D0; --violet:#9B6BFF;
    /* live channel for this set (matches its hub card) */
    --ch:#FF2E9A; --on-ch:#0E0E10;
    /* fonts */
    --disp:'Syne',system-ui,sans-serif; --ed:'Fraunces',Georgia,serif;
    --mono:'Space Mono',ui-monospace,monospace; --body:'Inter',system-ui,sans-serif;
    --radius:0;
  }
  *{box-sizing:border-box; border-radius:0}
  body{
    margin:0; background:var(--bg);
    background-image:radial-gradient(rgba(255,255,255,.05) 1px, transparent 1px);
    background-size:22px 22px;
    color:var(--ink);
    font-family:var(--body); -webkit-font-smoothing:antialiased; line-height:1.5;
  }
  a{color:inherit}
  .sheet{max-width:1560px; margin:0 auto; padding:18px 26px 40px}
  .mono{font-family:var(--mono); text-transform:uppercase; letter-spacing:.16em}
  .glitch{text-shadow:-2px 0 var(--cyan), 2px 0 var(--mag)}

  /* ---------- masthead ---------- */
  .mast{display:flex; align-items:center; justify-content:space-between; gap:14px;
    padding:10px 0 16px; border-bottom:1px solid var(--line); flex-wrap:wrap}
  .markwrap{display:flex; align-items:center; gap:11px; text-decoration:none}
  .mk{font-family:var(--mono); font-weight:700; font-size:24px; color:var(--ink); line-height:1}
  .mklab{font-family:var(--mono); font-size:9.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); line-height:1.3}
  .back{font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--muted); text-decoration:none; border:1px solid var(--line); padding:9px 14px; background:var(--panel)}
  .back:hover{color:var(--ink); border-color:var(--ch)}

  /* ---------- header ---------- */
  .top{display:flex; gap:18px; align-items:flex-start; flex-wrap:wrap; padding-top:22px}
  .brand{flex:1 1 460px; min-width:320px}
  .kicker{font-family:var(--mono); letter-spacing:.22em; text-transform:uppercase; font-size:11px; color:var(--ch); font-weight:700}
  h1{font-family:var(--disp); font-weight:800; letter-spacing:-.02em;
    font-size:clamp(36px,6vw,76px); line-height:.92; margin:10px 0 8px; text-transform:uppercase; color:var(--ink)}
  .subtitle{font-family:var(--ed); font-style:italic; color:#D6D6DE; font-weight:400; font-size:clamp(15px,1.8vw,20px); line-height:1.4; max-width:46ch}
  .giginfo{display:flex; gap:8px 18px; flex-wrap:wrap; margin-top:14px; font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted)}
  .giginfo b{color:var(--ch); font-weight:700}
  .status{display:inline-block; font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase;
    padding:3px 9px; border:1px solid var(--ch); color:var(--ch); font-weight:700}

  .chips{display:flex; gap:10px; flex-wrap:wrap; align-items:stretch}
  .chip{background:var(--panel); border:1px solid var(--line); padding:11px 14px; min-width:96px; text-align:center}
  .chip .big{font-family:var(--disp); font-size:20px; font-weight:800; color:#fff; display:flex; gap:6px; justify-content:center; align-items:center; letter-spacing:-.01em}
  .chip .lbl{font-family:var(--mono); font-size:9px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-top:5px}
  .chip .big .ic{color:var(--ch); font-family:var(--body)}

  /* ---------- phase nav ---------- */
  .phasenav{display:flex; flex-wrap:wrap; align-items:center; gap:8px; margin:20px 2px 16px;
    font-family:var(--mono); font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase}
  .phasenav .ar{color:var(--faint)}

  /* ---------- layout ---------- */
  .grid{display:grid; grid-template-columns: minmax(0,1fr) 330px; gap:18px; align-items:start}
  @media(max-width:1080px){ .grid{grid-template-columns:1fr} }
  .card{background:var(--panel); border:1px solid var(--line)}
  .card h3{margin:0; padding:13px 16px; font-family:var(--mono); font-size:11px; letter-spacing:.16em;
    text-transform:uppercase; color:#DBDBE4; border-bottom:1px solid var(--line); text-align:left}
  .card h3::before{content:"// "; color:var(--ch)}

  /* ---------- main table ---------- */
  .tablewrap{overflow-x:auto}
  table{width:100%; border-collapse:collapse; font-size:12.5px; min-width:920px}
  thead th{position:sticky; top:0; background:var(--well); color:var(--muted); font-family:var(--mono);
    font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; font-weight:700; padding:10px 8px;
    text-align:left; border-bottom:1px solid var(--line); white-space:nowrap}
  tbody td{padding:8px; border-bottom:1px solid rgba(42,42,50,.7); white-space:nowrap}
  tbody tr:hover{background:rgba(255,255,255,.02)}
  .c-num{color:var(--faint); font-family:var(--mono); font-variant-numeric:tabular-nums; text-align:center; width:26px}
  .c-song{font-weight:600; color:#fff}
  .c-song .mix{color:var(--muted); font-weight:400; font-size:11px}
  .c-artist{color:#CDCDD8}
  .cam{display:inline-block; min-width:32px; text-align:center; font-family:var(--mono); font-weight:700; font-size:11px; padding:3px 7px; color:#0E0E10}
  .key{color:var(--ink); font-weight:600}
  .simkey{color:var(--faint); font-family:var(--mono); font-size:11px}
  .bpm{font-family:var(--mono); font-variant-numeric:tabular-nums; color:#fff; font-weight:700; text-align:right}
  .energy-cells{display:inline-flex; gap:2px}
  .ecell{width:8px; height:12px; background:#26262e}
  .role{color:#C9C9D4}
  .tip{color:var(--muted); font-family:var(--mono); font-size:11px}
  .phase-pill{font-family:var(--mono); font-size:10px; font-weight:700; text-align:center; color:#0E0E10; padding:3px 7px; display:inline-block; min-width:20px}
  .apex{color:var(--lime); font-family:var(--mono); font-size:10px; margin-left:5px}
  .pick{color:var(--ch); font-family:var(--mono); font-size:10px; margin-left:5px}
  .phase-sep td{background:rgba(255,255,255,.02); border-top:1px solid var(--line)}
  .phase-sep .lab{display:flex; align-items:center; gap:8px; font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; padding:7px 8px}
  .phase-sep .lab small{color:var(--muted); font-weight:400; letter-spacing:.04em; text-transform:none}
  .dot{width:9px; height:9px}

  /* ---------- right column ---------- */
  .rc{display:flex; flex-direction:column; gap:16px}
  svg{display:block; width:100%; height:auto; overflow:visible}
  .legend{display:flex; flex-wrap:wrap; gap:8px 12px; padding:10px 14px; font-family:var(--mono); font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted)}
  .legend span{display:inline-flex; align-items:center; gap:6px}
  .legend i{width:15px; height:15px; display:inline-flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; color:#0E0E10; font-style:normal}
  .wheelwrap{padding:12px}
  .coreline{text-align:center; color:var(--muted); font-size:11px; padding:0 12px 12px; line-height:1.5}
  .coreline b{color:var(--ch)}
  .two{display:grid; grid-template-columns:1fr 1fr; gap:16px}
  .guide{padding:12px 14px; font-size:11.5px; color:var(--muted); line-height:1.6}
  .guide .h{font-family:var(--mono); color:#DBDBE4; font-weight:700; margin:10px 0 3px; font-size:10px; letter-spacing:.1em; text-transform:uppercase}
  .guide .h:first-child{margin-top:0}
  .guide .k{color:var(--ch); font-family:var(--mono); font-weight:700}
  .guide .avoid{color:var(--orange); font-family:var(--mono); font-weight:700}
  .tips{padding:12px 14px; font-size:11.5px; color:var(--muted); display:flex; flex-direction:column; gap:9px; line-height:1.5}
  .tips .t{display:flex; gap:9px; align-items:flex-start}
  .tips .t .n{color:var(--ch); font-family:var(--mono); font-weight:700}
  .pools{padding:14px}
  .pool{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 0; border-bottom:1px solid rgba(42,42,50,.7)}
  .pool:last-child{border-bottom:none}
  .pool .nm{font-weight:600; color:#fff; font-size:12.5px}
  .pool .av{font-family:var(--mono); font-weight:700; font-size:12.5px}
  .pool .bar{height:8px; background:#26262e; overflow:hidden; margin-top:6px}
  .pool .fill{height:100%}
  .pool .pct{font-family:var(--mono); font-size:10px; color:var(--muted); margin-top:4px; letter-spacing:.06em}

  /* ---------- footer band ---------- */
  .band{margin-top:18px; display:grid; grid-template-columns: 1fr 1.2fr 1.4fr; gap:16px}
  @media(max-width:1080px){ .band{grid-template-columns:1fr} }
  .band .card{padding:15px 16px}
  .band .cap{font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:#DBDBE4; font-weight:700; margin-bottom:10px}
  .band .cap::before{content:"// "; color:var(--ch)}
  .bpmflow{display:flex; align-items:center; gap:12px}
  .bpmflow .val{font-family:var(--disp); font-size:28px; font-weight:800; color:#fff; line-height:1}
  .bpmflow .val small{display:block; font-family:var(--mono); font-size:8.5px; letter-spacing:.12em; color:var(--muted); font-weight:700; margin-top:4px}
  .bpmflow .desc{font-size:11px; color:var(--muted); line-height:1.5}
  .vibes{display:flex; gap:14px; flex-wrap:wrap}
  .vibe{text-align:center; font-family:var(--mono); font-size:9px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); width:78px}
  .vibe .ic{width:42px; height:42px; margin:0 auto 7px; display:flex; align-items:center; justify-content:center; font-size:20px; background:var(--panel2); border:1px solid var(--line); color:var(--ch)}
  .djtips{font-size:11.5px; color:var(--muted); line-height:1.55}
  .djtips li{margin:5px 0}
  .djtips b{color:#CDCDD8}
  .footnote{text-align:left; color:var(--faint); font-family:var(--mono); font-size:10.5px; margin-top:18px; letter-spacing:.04em; line-height:1.6; border-top:1px solid var(--line); padding-top:16px}

  /* ======================================================================
     RESPONSIVE — dedicated phone + tablet UIs (cards replace the table).
     ====================================================================== */
  html{scroll-behavior:smooth}
  .trackcards{display:none}
  #mnav{display:none}
  .card, .rc > .card, .two{scroll-margin-top:16px}

  .trk-list{display:flex; flex-direction:column; gap:12px; padding:14px}
  .tc-phase{grid-column:1/-1; display:flex; align-items:center; gap:8px;
    font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
    color:#DFDFE7; margin:6px 2px 2px; padding-top:4px}
  .tc-phase:first-child{margin-top:0}
  .tc-phase small{color:var(--muted); font-weight:400; letter-spacing:.02em; text-transform:none}
  .tcard{background:var(--panel2); border:1px solid var(--line); border-left:4px solid var(--line); padding:12px 13px}
  .tc-top{display:flex; align-items:center; gap:11px}
  .tc-num{flex:none; width:30px; height:30px; display:flex; align-items:center; justify-content:center;
    font-family:var(--mono); font-weight:700; font-size:14px; color:#0E0E10; font-variant-numeric:tabular-nums}
  .tc-title{flex:1 1 auto; min-width:0}
  .tc-song{font-family:var(--disp); font-weight:700; color:#fff; font-size:16px; line-height:1.15}
  .tc-song .apex,.tc-song .pick{font-size:12px}
  .tc-artist{color:#CDCDD8; font-size:13px; margin-top:2px}
  .tc-bpm{flex:none; text-align:right; font-family:var(--mono); font-weight:700; color:#fff; font-size:20px; font-variant-numeric:tabular-nums; line-height:1}
  .tc-bpm small{display:block; font-size:8px; letter-spacing:.12em; color:var(--muted); font-weight:700; margin-top:3px}
  .tc-meta{display:flex; align-items:center; flex-wrap:wrap; gap:8px 10px; margin-top:11px}
  .tc-meta .cam{font-size:12px; padding:3px 8px; min-width:34px}
  .tc-key{color:var(--ink); font-weight:600; font-size:13px}
  .tc-sim{color:var(--faint); font-family:var(--mono); font-size:11px}
  .tc-energy{display:inline-flex; align-items:center; gap:6px; margin-left:auto}
  .tc-energy .elabel{font-family:var(--mono); font-size:11px; font-weight:700; color:var(--muted); letter-spacing:.04em}
  .tc-lines{margin-top:10px; display:flex; flex-direction:column; gap:5px}
  .tc-line{font-size:13px; color:#C9C9D4}
  .tc-line .k{display:inline-block; min-width:44px; color:var(--muted); font-family:var(--mono); font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase}

  /* ======================= TABLET : 600–1079px ======================= */
  @media (min-width:600px) and (max-width:1079px){
    .sheet{padding:16px 20px 40px}
    .tablewrap{display:none}
    .trackcards{display:block}
    .trk-list{display:grid; grid-template-columns:1fr 1fr; gap:12px}
    .two{display:contents}
    .rc{display:grid; grid-template-columns:1fr 1fr; gap:16px; align-items:start}
    #sec-pools{grid-column:1/-1}
    #mnav{display:flex; position:sticky; top:0; z-index:40; gap:8px; margin:0 0 16px; padding:8px;
      background:rgba(14,14,16,.9); backdrop-filter:blur(10px); border:1px solid var(--line)}
    #mnav a{flex:1; text-align:center; padding:12px 6px; font-family:var(--mono); font-size:11px; font-weight:700;
      letter-spacing:.06em; text-transform:uppercase; color:#CDCDD8; text-decoration:none; background:var(--panel);
      border:1px solid var(--line); min-height:44px; display:flex; align-items:center; justify-content:center}
    .card, .rc > .card, .two > .card{scroll-margin-top:74px}
  }

  /* ========================= PHONE : ≤599px ========================= */
  @media (max-width:599px){
    body{font-size:16px}
    .sheet{max-width:100%; padding:14px 14px calc(78px + env(safe-area-inset-bottom))}
    .mast{padding-bottom:12px}
    .top{gap:12px; padding-top:16px}
    h1{font-size:clamp(30px,10vw,42px)}
    .subtitle{font-size:14px}
    .chips{gap:8px}
    .chip{flex:1 1 44%; min-width:0; padding:10px}
    .chip .big{font-size:17px}
    .phasenav{flex-wrap:nowrap; overflow-x:auto; margin:14px 0; padding-bottom:6px; -webkit-overflow-scrolling:touch; font-size:11px}
    .phasenav span{white-space:nowrap}
    .grid{grid-template-columns:1fr; gap:14px}
    .tablewrap{display:none}
    .trackcards{display:block}
    .trk-list{display:flex; flex-direction:column; gap:11px; padding:12px}
    .rc{gap:14px}
    .two{grid-template-columns:1fr}
    .band{margin-top:14px}
    #mnav{display:flex; position:fixed; left:0; right:0; bottom:0; z-index:50; justify-content:space-around; gap:2px;
      padding:6px 6px calc(6px + env(safe-area-inset-bottom)); background:rgba(8,8,12,.95); backdrop-filter:blur(12px); border-top:1px solid var(--line)}
    #mnav a{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
      min-height:52px; padding:6px 2px; color:var(--muted); text-decoration:none; font-family:var(--mono);
      font-size:9px; font-weight:700; letter-spacing:.06em; text-transform:uppercase}
    #mnav a .mi{font-size:18px; line-height:1; color:var(--ch)}
    #mnav a:active{background:rgba(255,46,154,.14)}
    .guide,.tips,.djtips,.coreline,.legend{font-size:13px}
    .footnote{font-size:11px}
  }
</style>
</head>
<body>
<div class="sheet">

  <div class="mast">
    <a class="markwrap" href="../index.html">
      <span class="mk glitch">ΑΩ</span>
      <span class="mklab">Alpha Omega<br>Collective</span>
    </a>
    <a class="back" href="../index.html">← All gigs</a>
  </div>

  <div class="top">
    <div class="brand">
      <div class="kicker" id="kicker"></div>
      <h1 id="title"></h1>
      <div class="subtitle" id="subtitle"></div>
      <div class="giginfo" id="giginfo"></div>
    </div>
    <div class="chips" id="chips"></div>
  </div>

  <div class="phasenav" id="phasenav"></div>

  <nav id="mnav">
    <a href="#sec-tracks"><span class="mi">▤</span>Tracks</a>
    <a href="#sec-energy"><span class="mi">∿</span>Energy</a>
    <a href="#sec-wheel"><span class="mi">◎</span>Keys</a>
    <a href="#sec-guide"><span class="mi">✎</span>Guide</a>
  </nav>

  <div class="grid">
    <div class="card" id="sec-tracks">
      <div class="tablewrap">
        <table>
          <thead><tr>
            <th>#</th><th>Song</th><th>Artist</th><th>Camelot</th><th>Musical Key</th>
            <th>Similar Keys</th><th>BPM</th><th>Energy (1–10)</th><th>Phase</th><th>Role in Set</th><th>Transition Tip</th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div class="trackcards"><div class="trk-list" id="trklist"></div></div>
    </div>

    <div class="rc">
      <div class="card" id="sec-energy">
        <h3>Energy Curve</h3>
        <svg id="curve" viewBox="0 0 320 190" preserveAspectRatio="none"></svg>
        <div class="legend" id="curvelegend"></div>
      </div>

      <div class="card" id="sec-wheel">
        <h3>Key · Camelot Wheel</h3>
        <div class="wheelwrap"><svg id="wheel" viewBox="0 0 300 300"></svg></div>
        <div class="coreline" id="coreline"></div>
      </div>

      <div class="two" id="sec-guide">
        <div class="card">
          <h3>Harmonic Guide</h3>
          <div class="guide" id="harmguide"></div>
        </div>
        <div class="card">
          <h3>Transition Tips</h3>
          <div class="tips" id="transtips"></div>
        </div>
      </div>

      <div class="card" id="sec-pools">
        <h3>Pool Availability</h3>
        <div class="pools" id="pools"></div>
      </div>
    </div>
  </div>

  <div class="band">
    <div class="card">
      <div class="cap">BPM Flow</div>
      <div class="bpmflow">
        <div class="val" id="bpmStart"></div>
        <div class="desc" id="bpmDesc"></div>
        <div class="val" id="bpmPeak" style="text-align:right"></div>
      </div>
    </div>
    <div class="card">
      <div class="cap">Vibe &amp; Sound</div>
      <div class="vibes" id="vibes"></div>
    </div>
    <div class="card">
      <div class="cap">DJ Tips For This Set</div>
      <ul class="djtips" id="djtips" style="margin:0; padding-left:16px"></ul>
    </div>
  </div>

  <div class="footnote" id="footnote"></div>
</div>

<script>
/* ============================================================================
   EDIT THIS OBJECT ONLY.  (Also update the AO-GIG header comment at the top of
   the file so the hub card shows the right venue/date/channel.)
   Phase colours use Alpha Omega Collective channels.
   ============================================================================ */
const SET = {
  kicker: "DJ Set Sheet • Melodic / Organic House & Techno",
  title: "Set 5",
  subtitle: "The Long Way Home — Beatport-verified play sequence",
  gig: { venue:"Venue Private", city:"Kuala Lumpur", date:"2026-08-09", status:"upcoming" },
  totalLength: "~2.5 hours",

const CAMELOT_KEY = {
  "1A":"Ab Minor","1B":"B Major","2A":"Eb Minor","2B":"F# Major","3A":"Bb Minor","3B":"Db Major",
  "4A":"F Minor","4B":"Ab Major","5A":"C Minor","5B":"Eb Major","6A":"G Minor","6B":"Bb Major",
  "7A":"D Minor","7B":"F Major","8A":"A Minor","8B":"C Major","9A":"E Minor","9B":"G Major",
  "10A":"B Minor","10B":"D Major","11A":"F# Minor","11B":"A Major","12A":"Db Minor","12B":"E Major"
};
function parseCam(c){ const m=/^(\d{1,2})([AB])$/.exec((c||"").trim().toUpperCase()); return m?{n:+m[1],l:m[2]}:null; }
function similarKeys(c){ const p=parseCam(c); if(!p) return "—"; const down=((p.n+10)%12)+1, up=(p.n%12)+1; return `${down}${p.l}, ${up}${p.l}`; }
function relativeKey(c){ const p=parseCam(c); if(!p) return "—"; return `${p.n}${p.l==="A"?"B":"A"}`; }
function opposite(c){ const p=parseCam(c); if(!p) return "—"; return `${((p.n+5)%12)+1}${p.l}`; }
function phaseById(id){ return SET.phases.find(p=>p.id===id) || {color:"#888",name:"",icon:""}; }

(function(){
  const chMap={lime:"#C6F000",cobalt:"#3E6BFF",orange:"#FF5A2C",magenta:"#FF2E9A",teal:"#7EE8D0",violet:"#9B6BFF"};
  const m=/<!--AO-GIG\s*([\s\S]*?)\s*AO-GIG-->/.exec(document.documentElement.outerHTML);
  let ch=null;
  if(m){ try{ const g=JSON.parse(m[1]); if(g.channel && chMap[g.channel]) ch=chMap[g.channel]; }catch(e){} }
  if(ch){ document.documentElement.style.setProperty('--ch', ch);
          document.documentElement.style.setProperty('--on-ch', ch==='#3E6BFF'?'#F4F4F0':'#0E0E10'); }
})();

/* energy curve */
(function(){
  const W=320,H=190,padL=26,padR=10,padT=16,padB=24;
  const ts=SET.tracks.slice().sort((a,b)=>a.n-b.n), n=ts.length;
  const xs=i=>padL+(W-padL-padR)*(i/(n-1));
  const ys=e=>padT+(H-padT-padB)*(1-e/10);
  const pts=ts.map((t,i)=>[xs(i),ys(t.energy)]);
  const line=(()=>{let d=`M${pts[0][0].toFixed(1)},${pts[0][1].toFixed(1)}`;
    for(let i=0;i<pts.length-1;i++){const p0=pts[i-1]||pts[i],p1=pts[i],p2=pts[i+1],p3=pts[i+2]||p2;
      const c1x=p1[0]+(p2[0]-p0[0])/6,c1y=p1[1]+(p2[1]-p0[1])/6,c2x=p2[0]-(p3[0]-p1[0])/6,c2y=p2[1]-(p3[1]-p1[1])/6;
      d+=`C${c1x.toFixed(1)},${c1y.toFixed(1)} ${c2x.toFixed(1)},${c2y.toFixed(1)} ${p2[0].toFixed(1)},${p2[1].toFixed(1)}`;}return d;})();
  const area=line+`L${pts[n-1][0].toFixed(1)},${H-padB}L${pts[0][0].toFixed(1)},${H-padB}Z`;
  let bands="",seen={};
  ts.forEach((t,i)=>{ if(seen[t.phase]===undefined) seen[t.phase]=i; });
  const keys=Object.keys(seen).map(Number).sort((a,b)=>a-b);
  keys.forEach((ph,k)=>{const s=seen[ph],e=(k<keys.length-1)?seen[keys[k+1]]:n;
    const x1=xs(s-0.5),x2=xs(e-0.5),xa=Math.max(padL,x1),xb=Math.min(W-padR,x2);
    bands+=`<rect x="${xa.toFixed(1)}" y="${padT-6}" width="${(xb-xa).toFixed(1)}" height="${H-padT-padB+10}" fill="${phaseById(ph).color}" opacity=".10"/>`;});
  let grid="",yl="";
  for(let e=0;e<=10;e+=2){const y=ys(e);grid+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#2A2A32" stroke-width=".7" opacity=".6"/>`;yl+=`<text x="${padL-5}" y="${y+3}" text-anchor="end" font-size="7" fill="#63636F" font-family="monospace">${e}</text>`;}
  let marks="";
  ts.forEach((t,i)=>{ if(t.tag==='apex'){const x=xs(i),y=ys(t.energy);
    marks+=`<rect x="${(x-4).toFixed(1)}" y="${(y-4).toFixed(1)}" width="8" height="8" fill="${phaseById(t.phase).color}" stroke="#0E0E10" stroke-width="1.5"/>`;}
    if(t.tag==='pick'){const x=xs(i),y=ys(t.energy);marks+=`<rect x="${(x-3.4).toFixed(1)}" y="${(y-3.4).toFixed(1)}" width="6.8" height="6.8" fill="#0E0E10" stroke="${phaseById(t.phase).color}" stroke-width="1.6"/>`;} });
  const stops=SET.phases.map((p,i)=>`<stop offset="${Math.round(i/(SET.phases.length-1)*100)}%" stop-color="${p.color}"/>`).join('');
  const splitRange=r=>String(r||"").split(/[–-]/).map(s=>s.trim());
  const startLabel=(SET.phases[0]&&splitRange(SET.phases[0].time)[0])||"0:00";
  const lastRange=SET.phases[SET.phases.length-1]&&splitRange(SET.phases[SET.phases.length-1].time);
  const endLabel=(lastRange&&lastRange[1])||(lastRange&&lastRange[0])||"";
  document.getElementById('curve').innerHTML=`
    <defs><linearGradient id="cg" x1="0" y1="0" x2="1" y2="0">${stops}</linearGradient>
      <linearGradient id="ca" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FF2E9A" stop-opacity=".26"/><stop offset="100%" stop-color="#FF2E9A" stop-opacity="0"/></linearGradient></defs>
    ${bands}${grid}${yl}
    <path d="${area}" fill="url(#ca)"/>
    <path d="${line}" fill="none" stroke="url(#cg)" stroke-width="2.4" stroke-linecap="square"/>
    ${marks}
    <text x="${padL}" y="${H-6}" font-size="7" fill="#63636F" font-family="monospace">${startLabel}</text>
    <text x="${W-padR}" y="${H-6}" text-anchor="end" font-size="7" fill="#63636F" font-family="monospace">${endLabel}</text>
    <text x="10" y="${padT+2}" font-size="7" fill="#63636F" font-family="monospace" transform="rotate(-90 10 ${padT+2})">Energy 1–10</text>`;
  document.getElementById('curvelegend').innerHTML = SET.phases.map((p,i)=>
    `<span><i style="background:${p.color}">${i+1}</i>${p.name}</span>`).join('');
})();

/* camelot wheel */
(function(){
  const cx=150,cy=150,rOut=138,rIn=104,rInner2=70;
  const core=parseCam(SET.coreKey);
  let seg="",lab="";
  for(let i=0;i<12;i++){
    const num=((i)%12)+1;
    const a0=(i/12)*2*Math.PI - Math.PI/2 - Math.PI/12;
    const a1=a0+2*Math.PI/12;
    ["B","A"].forEach((L,ring)=>{
      const ro = ring===0? rOut : rIn;
      const ri = ring===0? rIn : rInner2;
      const isCore = core && core.n===num && core.l===L;
      const p=(r,a)=>[cx+r*Math.cos(a),cy+r*Math.sin(a)];
      const [x0,y0]=p(ri,a0),[x1,y1]=p(ro,a0),[x2,y2]=p(ro,a1),[x3,y3]=p(ri,a1);
      const large=0;
      const fill = isCore ? "var(--ch)" : (ring===0? "rgba(126,232,208,.12)":"rgba(62,107,255,.14)");
      const stroke = isCore ? "var(--ch)" : "#2A2A32";
      seg+=`<path d="M${x0.toFixed(1)},${y0.toFixed(1)} L${x1.toFixed(1)},${y1.toFixed(1)} A${ro},${ro} 0 ${large} 1 ${x2.toFixed(1)},${y2.toFixed(1)} L${x3.toFixed(1)},${y3.toFixed(1)} A${ri},${ri} 0 ${large} 0 ${x0.toFixed(1)},${y0.toFixed(1)} Z" fill="${fill}" stroke="${stroke}" stroke-width="1"/>`;
      const am=(a0+a1)/2, rm=(ro+ri)/2;
      const [lx,ly]=p(rm,am);
      lab+=`<text x="${lx.toFixed(1)}" y="${(ly+3).toFixed(1)}" text-anchor="middle" font-size="10" font-weight="700" font-family="monospace" fill="${isCore?'#0E0E10':'#B6B6C4'}">${num}${L}</text>`;
    });
  }
  const centerKey = CAMELOT_KEY[SET.coreKey.toUpperCase()]||"";
  document.getElementById('wheel').innerHTML=`${seg}${lab}
    <rect x="${cx-(rInner2-2)}" y="${cy-(rInner2-2)}" width="${(rInner2-2)*2}" height="${(rInner2-2)*2}" fill="#121216" stroke="#2A2A32"/>
    <text x="${cx}" y="${cy-6}" text-anchor="middle" font-size="22" font-weight="800" font-family="monospace" fill="var(--ch)">${SET.coreKey}</text>
    <text x="${cx}" y="${cy+12}" text-anchor="middle" font-size="9" fill="#CDCDD8">${centerKey}</text>
    <text x="${cx}" y="${cy+25}" text-anchor="middle" font-size="7" fill="#63636F" font-family="monospace" letter-spacing="1">CORE KEY</text>`;
  document.getElementById('coreline').innerHTML = `Most tracks sit near <b>${SET.coreKey} (${centerKey})</b> — outer ring = B (major), inner = A (minor). Move ±1 or switch A/B to stay in key.`;
})();
