<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Set List · Alpha Omega Collective</title>
<meta name="theme-color" content="#0E0E10">
<meta name="description" content="Upcoming DJ sets & gig playlists — key, BPM and energy, laid out track by track.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Fraunces:ital,opsz,wght@1,9,400;1,9,500&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230E0E10'/%3E%3Ctext x='16' y='23' font-family='monospace' font-size='18' font-weight='700' text-anchor='middle' fill='%23C6F000'%3E%CE%91%CE%A9%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --bg:#0E0E10; --panel:#17171B; --panel2:#1F1F26; --well:#121216; --line:#2A2A32;
    --ink:#F4F4F0; --muted:#8A8A98; --faint:#63636F;
    --cyan:#00DCFF; --mag:#FF288F;
    --lime:#C6F000; --cobalt:#3E6BFF; --orange:#FF5A2C; --magenta:#FF2E9A; --teal:#7EE8D0; --violet:#9B6BFF;
    --ch:#C6F000; --on-ch:#0E0E10;
    --disp:'Syne',system-ui,sans-serif; --ed:'Fraunces',Georgia,serif;
    --mono:'Space Mono',ui-monospace,monospace; --body:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box; border-radius:0}
  body{
    margin:0; min-height:100vh; background:var(--bg);
    background-image:radial-gradient(rgba(255,255,255,.05) 1px, transparent 1px);
    background-size:22px 22px;
    color:var(--ink); font-family:var(--body); -webkit-font-smoothing:antialiased; line-height:1.5;
  }
  a{color:inherit; text-decoration:none}
  .wrap{max-width:1200px; margin:0 auto; padding:0 26px 64px}
  .mono{font-family:var(--mono); text-transform:uppercase; letter-spacing:.16em}
  .glitch{text-shadow:-2px 0 var(--cyan), 2px 0 var(--mag)}

  /* masthead */
  .mast{display:flex; align-items:center; justify-content:space-between; gap:14px;
    padding:18px 0 16px; border-bottom:1px solid var(--line); flex-wrap:wrap}
  .markwrap{display:flex; align-items:center; gap:11px}
  .mk{font-family:var(--mono); font-weight:700; font-size:26px; color:var(--ink); line-height:1}
  .mklab{font-family:var(--mono); font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); line-height:1.3}
  .dots{display:flex; gap:7px}
  .dot{width:20px; height:20px; border:1px solid rgba(255,255,255,.22); cursor:pointer; padding:0; background:none}
  .dot.on{outline:2px solid var(--ink); outline-offset:2px}

  /* hero */
  .hero{padding:56px 0 40px; border-bottom:1px solid var(--line)}
  .kick{font-family:var(--mono); font-size:11px; letter-spacing:.26em; text-transform:uppercase; color:var(--ch); margin-bottom:16px}
  h1{font-family:var(--disp); font-weight:800; font-size:clamp(46px,10vw,120px); line-height:.88;
    letter-spacing:-.03em; text-transform:uppercase; margin:0}
  h1 .b{color:var(--ch)}
  .lede{font-family:var(--ed); font-style:italic; font-size:clamp(17px,2.2vw,24px); line-height:1.4;
    max-width:44ch; margin-top:22px; color:#D6D6DE}
  .herostats{display:flex; gap:26px; flex-wrap:wrap; margin-top:26px; font-family:var(--mono);
    font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted)}
  .herostats b{color:var(--ink); font-weight:700}

  /* section head */
  .eyebrow{font-family:var(--mono); font-size:11px; letter-spacing:.2em; text-transform:uppercase;
    color:var(--muted); display:flex; gap:12px; align-items:center; margin:48px 0 22px}
  .eyebrow .i{color:var(--ch)}
  .eyebrow::after{content:""; flex:1; height:1px; background:var(--line)}
  .eyebrow .count{color:var(--faint)}

  /* gig grid */
  .grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(320px,1fr)); gap:16px}
  .gig{border:1px solid var(--line); background:var(--panel); display:flex; flex-direction:column;
    text-decoration:none; color:inherit; transition:transform .12s ease, border-color .12s ease; min-height:0}
  .gig:hover{transform:translateY(-3px); border-color:var(--gc)}
  .gig .top{padding:18px 18px 16px; color:#0E0E10; position:relative; overflow:hidden}
  .gig .top.oncobalt, .gig .top.onviolet{color:#F4F4F0}
  .gig .toprow{display:flex; justify-content:space-between; align-items:flex-start; gap:10px}
  .gig .status{font-family:var(--mono); font-size:9.5px; letter-spacing:.14em; text-transform:uppercase;
    font-weight:700; border:1px solid currentColor; padding:3px 8px; opacity:.85}
  .gig .num{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.1em; opacity:.7}
  .gig .date{font-family:var(--disp); font-weight:800; font-size:30px; line-height:1; margin:16px 0 4px; letter-spacing:-.01em}
  .gig .dow{font-family:var(--mono); font-size:10px; letter-spacing:.16em; text-transform:uppercase; font-weight:700; opacity:.75}
  .gig .title{font-family:var(--disp); font-weight:800; font-size:23px; line-height:1.02; text-transform:uppercase;
    letter-spacing:-.01em; margin-top:16px}
  .gig .venue{font-family:var(--mono); font-size:11px; letter-spacing:.06em; margin-top:8px; opacity:.85}
  .gig .body{padding:16px 18px; display:flex; flex-direction:column; gap:14px; flex:1}
  .gig .genre{font-family:var(--ed); font-style:italic; font-size:14px; color:#CDCDD8}
  .gig .stats{display:flex; gap:16px; flex-wrap:wrap; font-family:var(--mono); font-size:11px;
    letter-spacing:.06em; color:var(--muted)}
  .gig .stats b{color:var(--ink); font-weight:700; display:block; font-size:15px; letter-spacing:0; margin-top:2px}
  .gig .vibes{display:flex; gap:6px; flex-wrap:wrap; margin-top:auto}
  .gig .vibe{font-family:var(--mono); font-size:9.5px; letter-spacing:.08em; text-transform:uppercase;
    color:var(--muted); border:1px solid var(--line); padding:4px 8px}
  .gig .cta{display:flex; align-items:center; justify-content:space-between; padding:14px 18px;
    border-top:1px solid var(--line); font-family:var(--mono); font-size:11px; letter-spacing:.12em;
    text-transform:uppercase; color:var(--muted)}
  .gig:hover .cta{color:var(--gc)}
  .gig .cta .arrow{font-size:15px}

  /* states */
  .state{border:1px solid var(--line); background:var(--panel); padding:40px 24px; text-align:center;
    font-family:var(--mono); font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted)}
  .state.err{color:var(--orange)}
  .state .spin{display:inline-block; width:14px; height:14px; border:2px solid var(--line);
    border-top-color:var(--ch); animation:sp .8s linear infinite; margin-right:10px; vertical-align:-2px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .hint{margin-top:12px; font-family:var(--mono); font-size:10px; letter-spacing:.06em; text-transform:none; color:var(--faint); line-height:1.6}
  .hint code{color:var(--ch)}

  footer{border-top:1px solid var(--line); margin-top:56px; padding:26px 0 10px;
    font-family:var(--mono); font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--faint);
    display:flex; justify-content:space-between; flex-wrap:wrap; gap:12px}
  footer .ch{color:var(--ch)}

  @media(max-width:640px){
    .wrap{padding:0 16px 56px}
    .hero{padding:40px 0 32px}
    .grid{grid-template-columns:1fr}
    .herostats{gap:16px}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="mast">
    <div class="markwrap">
      <span class="mk glitch">ΑΩ</span>
      <span class="mklab">Alpha Omega<br>Collective</span>
    </div>
    <div class="dots" id="dots">
      <button class="dot on" data-ch="lime"    style="background:#C6F000" aria-label="Lime"></button>
      <button class="dot"    data-ch="cobalt"  style="background:#3E6BFF" aria-label="Cobalt"></button>
      <button class="dot"    data-ch="orange"  style="background:#FF5A2C" aria-label="Orange"></button>
      <button class="dot"    data-ch="magenta" style="background:#FF2E9A" aria-label="Magenta"></button>
      <button class="dot"    data-ch="teal"    style="background:#7EE8D0" aria-label="Teal"></button>
    </div>
  </div>

  <div class="hero">
    <div class="kick">Alpha Omega Collective · Live</div>
    <h1>Set<span class="b">/</span>List</h1>
    <div class="lede">Every gig, mapped. Upcoming sets and the crates behind them — key, BPM and energy, laid out track by track.</div>
    <div class="herostats" id="herostats"></div>
  </div>

  <div id="upcoming-sec"></div>
  <div id="past-sec"></div>

  <footer>
    <span>ΑΩ Alpha Omega Collective</span>
    <span>One system · many channels</span>
    <span class="ch" id="footcount"></span>
  </footer>
</div>

<script>
/* ============================================================================
   ALPHA OMEGA COLLECTIVE — GIG HUB
   ----------------------------------------------------------------------------
   Lists every set sheet in the /sets folder. On a live GitHub Pages site it
   auto-discovers files via the GitHub API — so ADDING A GIG = uploading its
   .html into /sets. Nothing here to edit.

   Fallbacks (for offline / local double-click preview, where the API and
   same-origin fetch are blocked): gigs.json, then the INLINE_SEED below.
   ============================================================================ */

/* Optional manual override — leave blank to auto-detect from the URL. */
const OWNER_OVERRIDE = "";
const REPO_OVERRIDE  = "";
const SETS_DIR = "sets";

/* Offline seed — mirrors the first set's AO-GIG header so the page shows
   something even when opened as a local file. The LIVE site ignores this. */
const INLINE_SEED = [
  { file:"set-5.html", title:"Set 5 — The Long Way Home", venue:"Venue TBC — edit me",
    city:"Kuala Lumpur", date:"2026-08-09", status:"upcoming", channel:"magenta",
    genre:"Melodic / Organic House & Techno", tracks:25, bpmRange:[120,146],
    duration:"~2.5 hours", vibes:["Melodic Techno","Organic Groove","Emotional Melodies"] }
];

const CHMAP = {lime:"#C6F000",cobalt:"#3E6BFF",orange:"#FF5A2C",magenta:"#FF2E9A",teal:"#7EE8D0",violet:"#9B6BFF"};
const CH_CYCLE = ["lime","cobalt","orange","magenta","teal","violet"];

/* -------- repo detection -------- */
function detectRepo(){
  let owner=OWNER_OVERRIDE, repo=REPO_OVERRIDE;
  const host=location.hostname;
  if(!owner && host.endsWith(".github.io")) owner=host.split(".")[0];
  if(!repo){
    const segs=location.pathname.split("/").filter(Boolean).filter(s=>!s.endsWith(".html"));
    if(segs.length) repo=segs[0];
    else if(owner) repo=owner+".github.io";
  }
  return (owner&&repo)?{owner,repo}:null;
}

/* -------- list set files -------- */
async function listViaAPI(){
  const r=detectRepo(); if(!r) throw new Error("no-repo");
  const url=`https://api.github.com/repos/${r.owner}/${r.repo}/contents/${SETS_DIR}`;
  const res=await fetch(url,{headers:{Accept:"application/vnd.github+json"}});
  if(!res.ok) throw new Error("api "+res.status);
  const arr=await res.json();
  return arr.filter(f=>f.type==="file" && /\.html?$/i.test(f.name) && !f.name.startsWith("_"))
            .map(f=>f.name);
}
async function listViaManifest(){
  const res=await fetch("gigs.json",{cache:"no-store"});
  if(!res.ok) throw new Error("no-manifest");
  const data=await res.json();
  const files=Array.isArray(data)?data:(data.files||[]);
  return files.map(x=>typeof x==="string"?x:x.file).filter(Boolean);
}

/* -------- parse one set sheet's AO-GIG header -------- */
function parseGigMeta(html,file){
  const m=/<!--AO-GIG\s*([\s\S]*?)\s*AO-GIG-->/.exec(html);
  let g={};
  if(m){ try{ g=JSON.parse(m[1]); }catch(e){ g={}; } }
  if(!g.title){ const t=/<title>([^<]*)<\/title>/i.exec(html); g.title=t?t[1].split("·")[0].trim():file; }
  g.file=file;
  return g;
}
async function fetchMeta(file){
  try{
    const res=await fetch(`${SETS_DIR}/${file}`,{cache:"no-store"});
    if(!res.ok) throw new Error("fetch "+res.status);
    return parseGigMeta(await res.text(), file);
  }catch(e){ return {file, title:file.replace(/\.html?$/,""), _thin:true}; }
}

/* -------- orchestrate -------- */
async function loadGigs(){
  let files=null, source="";
  try{ files=await listViaAPI(); source="api"; }
  catch(e){ try{ files=await listViaManifest(); source="manifest"; }catch(e2){ files=null; } }

  if(files && files.length){
    const metas=await Promise.all(files.map(fetchMeta));
    return {metas, source};
  }
  return {metas: INLINE_SEED.slice(), source:"seed"};
}

/* -------- date helpers -------- */
function parseDate(s){ if(!s) return null; const d=new Date(s+"T00:00:00"); return isNaN(d)?null:d; }
function fmtDate(d){ return d? d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}) : ""; }
function fmtDow(d){ return d? d.toLocaleDateString('en-GB',{weekday:'long'}).toUpperCase()+" · "+d.getFullYear() : ""; }
function isPast(g){
  const d=parseDate(g.date);
  if(g.status==="past") return true;
  if(g.status==="upcoming") return false;
  if(d) return d < new Date(new Date().toDateString());
  return false;
}

/* -------- render -------- */
function card(g, idx){
  const chName = (g.channel && CHMAP[g.channel]) ? g.channel : CH_CYCLE[idx % CH_CYCLE.length];
  const gc = CHMAP[chName];
  const d=parseDate(g.date);
  const past=isPast(g);
  const statusTxt = past ? "Played" : (g.status||"Upcoming");
  const bpm = Array.isArray(g.bpmRange)&&g.bpmRange.length===2 ? g.bpmRange[0]+"–"+g.bpmRange[1] : (g.bpm||"—");
  const vibes=(g.vibes||[]).slice(0,3).map(v=>`<span class="vibe">${v}</span>`).join("");
  const venueLine=[g.venue,g.city].filter(Boolean).join(" · ");
  const onCls = chName==="cobalt"?"oncobalt":(chName==="violet"?"onviolet":"");
  return `<a class="gig" href="${SETS_DIR}/${g.file}" style="--gc:${gc}">
    <div class="top ${onCls}" style="background:${gc}">
      <div class="toprow">
        <span class="status">${statusTxt}</span>
        <span class="num">${String(idx+1).padStart(2,'0')}</span>
      </div>
      ${d?`<div class="date">${fmtDate(d)}</div><div class="dow">${fmtDow(d)}</div>`:`<div class="date" style="font-size:20px">Date TBC</div>`}
      <div class="title">${g.title||g.file}</div>
      ${venueLine?`<div class="venue">◦ ${venueLine}</div>`:""}
    </div>
    <div class="body">
      ${g.genre?`<div class="genre">${g.genre}</div>`:""}
      <div class="stats">
        <span>Tracks<b>${g.tracks||"—"}</b></span>
        <span>BPM<b>${bpm}</b></span>
        <span>Length<b>${g.duration||"—"}</b></span>
      </div>
      <div class="vibes">${vibes}</div>
    </div>
    <div class="cta"><span>Open set sheet</span><span class="arrow">→</span></div>
  </a>`;
}

function section(title, code, list){
  if(!list.length) return "";
  const cards=list.map((g,i)=>card(g,i)).join("");
  return `<div class="eyebrow"><span class="i">${code}</span> ${title} <span class="count">· ${list.length}</span></div>
          <div class="grid">${cards}</div>`;
}

function render(metas){
  // sort: upcoming soonest-first, then dateless upcoming, then past most-recent-first
  const up = metas.filter(g=>!isPast(g)).sort((a,b)=>{
    const da=parseDate(a.date), db=parseDate(b.date);
    if(da&&db) return da-db; if(da) return -1; if(db) return 1; return 0;
  });
  const past = metas.filter(g=>isPast(g)).sort((a,b)=>{
    const da=parseDate(a.date), db=parseDate(b.date);
    if(da&&db) return db-da; if(da) return -1; if(db) return 1; return 0;
  });
  document.getElementById("upcoming-sec").innerHTML = section("Upcoming", "01", up)
     || `<div class="eyebrow"><span class="i">01</span> Upcoming</div>
         <div class="state">No upcoming sets yet
           <div class="hint">Add one by uploading a set sheet into <code>/${SETS_DIR}</code> on GitHub — it appears here automatically.</div>
         </div>`;
  document.getElementById("past-sec").innerHTML = past.length ? section("Past Sets", "02", past) : "";

  const totalTracks = metas.reduce((s,g)=>s+(+g.tracks||0),0);
  document.getElementById("herostats").innerHTML =
    `<span><b>${metas.length}</b> set${metas.length===1?"":"s"}</span>
     <span><b>${up.length}</b> upcoming</span>
     ${totalTracks?`<span><b>${totalTracks}</b> tracks mapped</span>`:""}`;
  document.getElementById("footcount").textContent = metas.length+" set"+(metas.length===1?"":"s")+" · updated live";
}

/* channel switcher (recolours the hub accent) */
document.querySelectorAll('.dot').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.dot').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  const c=CHMAP[b.dataset.ch]||"#C6F000";
  document.documentElement.style.setProperty('--ch', c);
  document.documentElement.style.setProperty('--on-ch', b.dataset.ch==='cobalt'?'#F4F4F0':'#0E0E10');
}));

/* boot */
document.getElementById("upcoming-sec").innerHTML =
  `<div class="eyebrow"><span class="i">01</span> Upcoming</div>
   <div class="state"><span class="spin"></span>Loading sets…</div>`;
loadGigs().then(({metas})=>render(metas)).catch(err=>{
  document.getElementById("upcoming-sec").innerHTML =
    `<div class="state err">Couldn't load sets<div class="hint">${(err&&err.message)||err}</div></div>`;
});
</script>
</body>
</html>
