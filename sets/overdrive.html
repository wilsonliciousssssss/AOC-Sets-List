<style>
:root{--bg:#0E0E10;--panel:#151519;--panel2:#1E1E24;--line:#2A2A32;--ink:#F4F4F0;--muted:#8A8A98;--faint:#63636F;--cyan:#C6F000;--blue:#3E6BFF;--pink:#FF2E9A;--violet:#7EE8D0;--red:#FF5A2C;--green:#7EE8D0;--gold:#C6F000;--glitch-cyan:#00DCFF;--glitch-mag:#FF288F;}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(1200px 700px at 78% -8%,rgba(198,240,0,.06),transparent 60%),radial-gradient(1000px 600px at 8% 4%,rgba(62,107,255,.05),transparent 55%),var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.45}
.sheet{max-width:1500px;margin:0 auto;padding:26px 26px 40px}
.top{display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap}.brand{flex:1 1 460px;min-width:320px}
.kicker{letter-spacing:.24em;text-transform:uppercase;font-size:12px;color:var(--cyan);font-weight:700}
h1{font-family:"Arial Black",Impact,sans-serif;font-weight:900;font-size:clamp(34px,5vw,58px);line-height:.95;margin:6px 0 4px;text-transform:uppercase;background:linear-gradient(90deg,#fff,#cfe0ff);-webkit-background-clip:text;background-clip:text;color:transparent}
.subtitle{color:var(--blue);font-weight:600;letter-spacing:.02em;font-size:13.5px;text-transform:uppercase}
.chips{display:flex;gap:10px;flex-wrap:wrap}.chip{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:12px;padding:10px 14px;min-width:92px;text-align:center}
.chip .big{font-size:19px;font-weight:800;color:#fff}.chip .lbl{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:3px}
.phasenav{display:flex;flex-wrap:wrap;gap:8px;margin:18px 2px 16px;font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}.phasenav .ar{color:var(--faint)}
.grid{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:18px;align-items:start}@media(max-width:1080px){.grid{grid-template-columns:1fr}}
.card{background:linear-gradient(180deg,var(--panel),#0E0E10);border:1px solid var(--line);border-radius:14px}.card h3{margin:0;padding:12px 16px;font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:#E4E4EA;border-bottom:1px solid var(--line);text-align:center}
.tablewrap{overflow-x:auto}table{width:100%;border-collapse:collapse;font-size:12.5px;min-width:760px}
thead th{position:sticky;top:0;background:#16161B;color:var(--muted);font-size:10px;letter-spacing:.09em;text-transform:uppercase;font-weight:700;padding:9px 8px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
tbody td{padding:7px 8px;border-bottom:1px solid rgba(42,42,50,.55)}tbody tr:hover{background:rgba(255,255,255,.025)}
.c-num{color:var(--faint);text-align:center;width:26px}.c-song{font-weight:700;color:#fff}.c-artist{color:#C7C7D0}.genre{color:#bfe9ff;font-size:11px}
.energy-cells{display:inline-flex;gap:2px}.ecell{width:8px;height:12px;border-radius:2px;background:#24242C}
.role{color:#C7C7D0}.tip{color:var(--muted)}.phase-pill{font-size:10px;font-weight:800;text-align:center;color:#fff;border-radius:6px;padding:2px 7px;display:inline-block;min-width:20px}
.apex{color:var(--gold);font-size:10px;margin-left:5px}.phase-sep td{background:rgba(255,255,255,.015);border-top:1px solid var(--line)}.phase-sep .lab{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:6px 8px}.phase-sep .lab small{color:var(--muted);font-weight:600;text-transform:none}.dot{width:9px;height:9px;border-radius:50%}
.rc{display:flex;flex-direction:column;gap:16px}svg{display:block;width:100%;height:auto;overflow:visible}
.legend{display:flex;flex-wrap:wrap;gap:8px 12px;padding:10px 14px;font-size:10.5px;color:var(--muted)}.legend span{display:inline-flex;align-items:center;gap:6px}.legend i{width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#001}
.pools{padding:14px}.pool{display:flex;flex-direction:column;padding:9px 0;border-bottom:1px solid rgba(42,42,50,.55)}.pool:last-child{border-bottom:none}.pool .r{display:flex;justify-content:space-between}.pool .nm{font-weight:700;color:#fff;font-size:12.5px}.pool .av{font-weight:800;font-size:12.5px;color:var(--cyan)}.pool .bar{height:8px;border-radius:5px;background:#24242C;overflow:hidden;margin-top:5px}.pool .fill{height:100%;border-radius:5px;background:var(--cyan)}
.tips{padding:12px 14px;font-size:11.5px;color:var(--muted);display:flex;flex-direction:column;gap:9px}.tips .t{display:flex;gap:9px}.tips .t .n{color:var(--cyan)}
.band{margin-top:18px;display:grid;grid-template-columns:1fr 1.4fr;gap:16px}@media(max-width:1080px){.band{grid-template-columns:1fr}}.band .card{padding:14px 16px}.cap{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#E4E4EA;font-weight:700;margin-bottom:8px}
.vibes{display:flex;gap:14px;flex-wrap:wrap}.vibe{text-align:center;font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);width:80px}.vibe .ic{width:42px;height:42px;margin:0 auto 6px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);color:var(--cyan)}
.djtips li{margin:4px 0;color:var(--muted);font-size:11.5px}.djtips b{color:#C7C7D0}.footnote{text-align:center;color:var(--faint);font-size:11px;margin-top:16px}

  .ao-siteheader{display:flex; align-items:center; justify-content:space-between; gap:12px;

  /* ===== glitch title (consistent with the site front) ===== */
  h1{ text-shadow:-1.6px 0 var(--glitch-cyan), 1.6px 0 var(--glitch-mag);

    0%,6%,100%{ text-shadow:-1.6px 0 #00DCFF,1.6px 0 #FF288F; transform:translate(0,0) }

    4%{ text-shadow:-2px 1px #00DCFF,2px -1px #FF288F; transform:translate(1px,0) }

  /* energy-graph hover tooltip (song/artist/genre/energy) */
  .curvewrap{position:relative}
  .curve-cursor{position:absolute; top:0; bottom:0; width:1px; background:var(--cyan); opacity:0; pointer-events:none}

  .curve-tip{position:absolute; z-index:20; min-width:150px; max-width:230px; padding:8px 10px;

(function(){const W=320,H=190,padL=26,padR=10,padT=16,padB=24;const ts=SET.tracks.slice().sort((a,b)=>a.n-b.n),n=ts.length;const xs=i=>padL+(W-padL-padR)*(i/(n-1));const ys=e=>padT+(H-padT-padB)*(1-e/10);const pts=ts.map((t,i)=>[xs(i),ys(t.energy)]);let d=`M${pts[0][0].toFixed(1)},${pts[0][1].toFixed(1)}`;for(let i=0;i<pts.length-1;i++){const p0=pts[i-1]||pts[i],p1=pts[i],p2=pts[i+1],p3=pts[i+2]||p2;const c1x=p1[0]+(p2[0]-p0[0])/6,c1y=p1[1]+(p2[1]-p0[1])/6,c2x=p2[0]-(p3[0]-p1[0])/6,c2y=p2[1]-(p3[1]-p1[1])/6;d+=`C${c1x.toFixed(1)},${c1y.toFixed(1)} ${c2x.toFixed(1)},${c2y.toFixed(1)} ${p2[0].toFixed(1)},${p2[1].toFixed(1)}`}const area=d+`L${pts[n-1][0].toFixed(1)},${H-padB}L${pts[0][0].toFixed(1)},${H-padB}Z`;let bands="",seen={};ts.forEach((t,i)=>{if(seen[t.phase]===undefined)seen[t.phase]=i});const keys=Object.keys(seen).map(Number).sort((a,b)=>a-b);keys.forEach((ph,k)=>{const s=seen[ph],e=(k<keys.length-1)?seen[keys[k+1]]:n;const x1=xs(s-0.5),x2=xs(e-0.5),xa=Math.max(padL,x1),xb=Math.min(W-padR,x2);bands+=`<rect x="${xa.toFixed(1)}" y="${padT-6}" width="${(xb-xa).toFixed(1)}" height="${H-padT-padB+10}" fill="${phaseById(ph).color}" opacity=".08"/>`});let grid="";for(let e=0;e<=10;e+=2){const y=ys(e);grid+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#2A2A32" stroke-width=".7" opacity=".5"/><text x="${padL-5}" y="${y+3}" text-anchor="end" font-size="7" fill="#63636F">${e}</text>`}let marks="";ts.forEach((t,i)=>{if(t.tag==='apex'){marks+=`<circle cx="${xs(i).toFixed(1)}" cy="${ys(t.energy).toFixed(1)}" r="4" fill="${phaseById(t.phase).color}" stroke="#0E0E10" stroke-width="1.5"/>`}});const stops=SET.phases.map((p,i)=>`<stop offset="${Math.round(i/(SET.phases.length-1)*100)}%" stop-color="${p.color}"/>`).join('');document.getElementById('curve').innerHTML=`<defs><linearGradient id="cg" x1="0" y1="0" x2="1" y2="0">${stops}</linearGradient><linearGradient id="ca" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#C6F000" stop-opacity=".26"/><stop offset="100%" stop-color="#C6F000" stop-opacity="0"/></linearGradient></defs>${bands}${grid}<path d="${area}" fill="url(#ca)"/><path d="${d}" fill="none" stroke="url(#cg)" stroke-width="2.4" stroke-linecap="round"/>${marks}<text x="${padL}" y="${H-6}" font-size="7" fill="#63636F">${SET.phases[0].time.split('–')[0].trim()}</text><text x="${W-padR}" y="${H-6}" text-anchor="end" font-size="7" fill="#63636F">${(SET.phases[SET.phases.length-1].time.split('–')[1]||'').trim()}</text>`;document.getElementById('curvelegend').innerHTML=SET.phases.map((p,i)=>`<span><i style="background:${p.color}">${i+1}</i>${p.name}</span>`).join('')})();
document.getElementById('pools').innerHTML=SET.pools.map(p=>{const pct=Math.round(p.available/p.total*100);return `<div class="pool"><div class="r"><span class="nm">${p.name}</span><span class="av">${p.available}</span></div><div class="bar"><div class="fill" style="width:${pct}%"></div></div></div>`}).join('');

/* ===== energy-graph hover tooltip (genre variant) ===== */
(function(){
  var wrap=document.querySelector('.curvewrap'); if(!wrap) return;
  var cursor=document.getElementById('curveCursor'), dot=document.getElementById('curveDot'), tip=document.getElementById('curveTip');
  var ts=SET.tracks.slice().sort(function(a,b){return a.n-b.n;}), n=ts.length; if(n<2) return;
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c];});}
  var W=320,H=190,padL=26,padR=10,padT=16,padB=24;
  function fx(i){return (padL+(W-padL-padR)*(i/(n-1)))/W;}
  function fy(e){return (padT+(H-padT-padB)*(1-e/10))/H;}
  function idxFromX(cx){var r=wrap.getBoundingClientRect(); var frac=(cx-r.left)/r.width;
    var i=Math.round(((frac*W-padL)/(W-padL-padR))*(n-1)); return Math.max(0,Math.min(n-1,i));}
  function show(i){
    var r=wrap.getBoundingClientRect(), t=ts[i], ph=(typeof phaseById==='function'?phaseById(t.phase):{color:'#C6F000',name:''});
    var px=fx(i)*r.width, py=fy(t.energy)*r.height;
    cursor.style.left=px+'px'; cursor.style.opacity='.55'; cursor.style.background=ph.color;
    dot.style.left=px+'px'; dot.style.top=py+'px'; dot.style.opacity='1'; dot.style.background=ph.color;
    tip.style.borderColor=ph.color;
    tip.innerHTML='<div class="tt-n">#'+t.n+' &middot; '+esc(ph.name)+'</div>'+
      '<div class="tt-song">'+esc(t.song)+'</div>'+
      '<div class="tt-art">'+esc(t.artist||'')+'</div>'+
      '<div class="tt-meta">'+esc(t.genre||'')+' &middot; E'+t.energy+'</div>';
    tip.style.opacity='1';
    var th=tip.offsetHeight, tw=tip.offsetWidth; var below=(py-th-14)<0;
    tip.style.transform=below?'translate(-50%,14px)':'translate(-50%,-115%)';
    tip.style.top=(below?py+10:py-8)+'px';
    var left=Math.min(Math.max(px,tw/2+4), r.width-tw/2-4); tip.style.left=left+'px';
  }
  function hide(){cursor.style.opacity='0'; dot.style.opacity='0'; tip.style.opacity='0';}
  wrap.style.cursor='crosshair';
  wrap.addEventListener('mousemove', function(e){ show(idxFromX(e.clientX)); });
  wrap.addEventListener('mouseleave', hide);
  wrap.addEventListener('touchstart', function(e){ if(e.touches[0]) show(idxFromX(e.touches[0].clientX)); },{passive:true});
  wrap.addEventListener('touchmove', function(e){ if(e.touches[0]) show(idxFromX(e.touches[0].clientX)); },{passive:true});
  wrap.addEventListener('touchend', function(){ setTimeout(hide,1600); });
})();

<script>
function __aoSearchTerm(t){var song=String(t.song||'').replace(/\((?:extended|original|radio|clean|dirty|bootleg|edit|mashup|remix|vip|feat[^)]*)[^)]*\)/ig,'').replace(/\s+/g,' ').trim();var art=String(t.artist||'').split(/\s+(?:vs\.?|ft\.?|feat\.?|&|x)\s+/i)[0].split(/[,(]/)[0].trim();return (art?art+' ':'')+(song||t.song);}
(function(){var byN={};(SET.tracks||[]).forEach(function(t){byN[t.n]=t;});var cache={},cbId=0,audio=new Audio(),curBtn=null,curN=null;audio.preload='none';var bar=document.createElement('div');bar.id='nowbar';bar.innerHTML='<button class="np-btn">&#10074;&#10074;</button><div class="np-info"><div class="np-song"></div><div class="np-art"></div></div><div class="np-prog"><div class="np-fill"></div></div><button class="np-x">&#10005;</button>';document.body.appendChild(bar);var npBtn=bar.querySelector('.np-btn'),npSong=bar.querySelector('.np-song'),npArt=bar.querySelector('.np-art'),npFill=bar.querySelector('.np-fill');function jsonp(term){return new Promise(function(res){var cb='__aoit'+(++cbId),sc=document.createElement('script');var to=setTimeout(function(){done(null);},7000);function done(r){try{delete window[cb];}catch(e){window[cb]=undefined;}if(sc.parentNode)sc.parentNode.removeChild(sc);clearTimeout(to);res(r);}window[cb]=function(data){done(data&&data.results?data.results:[]);};sc.onerror=function(){done(null);};sc.src='https://itunes.apple.com/search?media=music&entity=song&limit=6&term='+encodeURIComponent(term)+'&callback='+cb;document.body.appendChild(sc);});}
async function resolve(t){var k=t.n;if(k in cache)return cache[k];var r=await jsonp(__aoSearchTerm(t));if(!r||!r.length){r=await jsonp(String(t.song||'').replace(/\(.*?\)/g,'').trim());}var hit=(r||[]).filter(function(x){return x.previewUrl;})[0];cache[k]=hit?{url:hit.previewUrl,song:hit.trackName,art:hit.artistName}:null;return cache[k];}
function setBtn(btn,state){if(!btn)return;btn.classList.remove('busy','on','dead');if(state)btn.classList.add(state);btn.innerHTML=state==='on'?'&#10074;&#10074;':'&#9654;';if(state==='dead'){btn.title='No preview found — use Spotify / Apple';btn.innerHTML='&#8212;';}}
function stop(){audio.pause();if(curBtn)setBtn(curBtn,'');curBtn=null;curN=null;bar.classList.remove('show');}
async function toggle(btn){var n=+btn.getAttribute('data-n'),t=byN[n];if(!t)return;if(curN===n&&!audio.paused){audio.pause();setBtn(btn,'');bar.classList.remove('show');return;}if(curN===n&&audio.paused&&audio.src){audio.play();setBtn(btn,'on');bar.classList.add('show');return;}if(curBtn&&curBtn!==btn)setBtn(curBtn,'');setBtn(btn,'busy');curBtn=btn;curN=n;var hit=await resolve(t);if(curN!==n)return;if(!hit){setBtn(btn,'dead');curBtn=null;curN=null;return;}audio.src=hit.url;audio.currentTime=0;try{await audio.play();}catch(e){}setBtn(btn,'on');npSong.textContent=t.song;npArt.textContent=t.artist||hit.art||'';npFill.style.width='0%';bar.classList.add('show');}
document.addEventListener('click',function(e){var b=e.target.closest&&e.target.closest('.lbtn.play');if(!b)return;e.preventDefault();toggle(b);});
npBtn.addEventListener('click',function(){if(audio.paused){audio.play();if(curBtn)setBtn(curBtn,'on');}else{audio.pause();if(curBtn)setBtn(curBtn,'');}});
bar.querySelector('.np-x').addEventListener('click',stop);
audio.addEventListener('timeupdate',function(){if(audio.duration)npFill.style.width=(100*audio.currentTime/audio.duration)+'%';});
audio.addEventListener('ended',function(){if(curBtn)setBtn(curBtn,'');npFill.style.width='100%';bar.classList.remove('show');curN=null;curBtn=null;});
})();
</script>
</body></html>
