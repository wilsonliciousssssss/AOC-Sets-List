<html lang="en">

<style>
  :root{
    --bg:#0E0E10; --panel:#17171B; --panel2:#1F1F26; --well:#121216; --line:#2A2A32;
    --ink:#F4F4F0; --muted:#8A8A98; --faint:#63636F;
    --cyan:#00DCFF; --mag:#FF288F;
    --lime:#C6F000; --cobalt:#3E6BFF; --orange:#FF5A2C; --magenta:#FF2E9A; --teal:#7EE8D0; --violet:#9B6BFF;
    --ch:#9B6BFF; --on-ch:#F4F4F0;
    --disp:'Syne',system-ui,sans-serif; --ed:'Fraunces',Georgia,serif;
    --mono:'Space Mono',ui-monospace,monospace; --body:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box; border-radius:0}
  body{margin:0; background:var(--bg);
    background-image:radial-gradient(rgba(255,255,255,.05) 1px, transparent 1px); background-size:22px 22px;
    color:var(--ink); font-family:var(--body); -webkit-font-smoothing:antialiased; line-height:1.5;}
  a{color:inherit}
  .sheet{max-width:1560px; margin:0 auto; padding:18px 26px 40px}
  .mono{font-family:var(--mono); text-transform:uppercase; letter-spacing:.16em}
  .glitch{text-shadow:-2px 0 var(--cyan), 2px 0 var(--mag)}
  .mast{display:flex; align-items:center; justify-content:space-between; gap:14px; padding:12px 26px; margin:0 -26px 4px; border-bottom:1px solid var(--line); flex-wrap:wrap; position:sticky; top:0; z-index:60; background:rgba(14,14,16,.94); backdrop-filter:blur(10px)}
  @media(max-width:599px){ .mast{padding:10px 14px; margin:0 -14px 4px} }
  .markwrap{display:flex; align-items:center; gap:12px; text-decoration:none}
  .mk{width:44px; height:44px; display:block; flex:none}
  .mklab{font-family:var(--mono); font-size:9.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); line-height:1.3}
  .back{font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); text-decoration:none; border:1px solid var(--line); padding:9px 14px; background:var(--panel)}
  .back:hover{color:var(--ink); border-color:var(--ch)}
  .top{display:flex; gap:18px; align-items:flex-start; flex-wrap:wrap; padding-top:22px}
  .brand{flex:1 1 460px; min-width:320px}
  .kicker{font-family:var(--mono); letter-spacing:.22em; text-transform:uppercase; font-size:11px; color:var(--ch); font-weight:700}
  h1{font-family:var(--disp); font-weight:800; letter-spacing:-.02em; font-size:clamp(36px,6vw,76px); line-height:.92; margin:10px 0 8px; text-transform:uppercase; color:var(--ink)}
  .subtitle{font-family:var(--ed); font-style:italic; color:#D6D6DE; font-weight:400; font-size:clamp(15px,1.8vw,20px); line-height:1.4; max-width:52ch}
  .giginfo{display:flex; gap:8px 18px; flex-wrap:wrap; margin-top:14px; font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted)}
  .giginfo b{color:var(--ch); font-weight:700}
  .status{display:inline-block; font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; padding:3px 9px; border:1px solid var(--ch); color:var(--ch); font-weight:700}
  .chips{display:flex; gap:10px; flex-wrap:wrap; align-items:stretch}
  .chip{background:var(--panel); border:1px solid var(--line); padding:11px 14px; min-width:96px; text-align:center}
  .chip .big{font-family:var(--disp); font-size:20px; font-weight:800; color:#fff; display:flex; gap:6px; justify-content:center; align-items:center; letter-spacing:-.01em}
  .chip .lbl{font-family:var(--mono); font-size:9px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-top:5px}
  .chip .big .ic{color:var(--ch); font-family:var(--body)}
  .phasenav{display:flex; flex-wrap:wrap; align-items:center; gap:8px; margin:20px 2px 16px; font-family:var(--mono); font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase}
  .phasenav .ar{color:var(--faint)}
  .grid{display:grid; grid-template-columns: minmax(0,1fr) 330px; gap:18px; align-items:start}
  @media(max-width:1080px){ .grid{grid-template-columns:1fr} }
  .card{background:var(--panel); border:1px solid var(--line)}
  .card h3{margin:0; padding:13px 16px; font-family:var(--mono); font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:#DBDBE4; border-bottom:1px solid var(--line); text-align:left}
  .card h3::before{content:"// "; color:var(--ch)}
  .tablewrap{overflow-x:auto}
  table{width:100%; border-collapse:collapse; font-size:12.5px; min-width:860px}
  thead th{position:sticky; top:0; background:var(--well); color:var(--muted); font-family:var(--mono); font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; font-weight:700; padding:10px 8px; text-align:left; border-bottom:1px solid var(--line); white-space:nowrap}
  tbody td{padding:8px; border-bottom:1px solid rgba(42,42,50,.7); white-space:nowrap}
  tbody tr:hover{background:rgba(255,255,255,.02)}
  .c-num{color:var(--faint); font-family:var(--mono); font-variant-numeric:tabular-nums; text-align:center; width:26px}
  .c-song{font-weight:600; color:#fff; white-space:normal; min-width:220px}
  .c-artist{color:#CDCDD8; white-space:normal; min-width:160px}
  .gpill{display:inline-block; font-family:var(--mono); font-size:10px; letter-spacing:.02em; color:#CDCDD8; border:1px solid var(--line); padding:3px 7px; white-space:nowrap}
  .energy-cells{display:inline-flex; gap:2px}
  .ecell{width:8px; height:12px; background:#26262e}
  .role{color:#C9C9D4}
  .tip{color:var(--muted); font-family:var(--mono); font-size:11px}
  .phase-pill{font-family:var(--mono); font-size:10px; font-weight:700; text-align:center; color:#0E0E10; padding:3px 7px; display:inline-block; min-width:20px}
  .apex{color:var(--lime); font-family:var(--mono); font-size:10px; margin-left:5px}
  .pick{color:var(--ch); font-family:var(--mono); font-size:10px; margin-left:5px}
  .phase-sep td{background:rgba(255,255,255,.02); border-top:1px solid var(--line)}
  .phase-sep .lab{display:flex; align-items:center; gap:8px; font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; padding:7px 8px}
  .phase-sep .lab small{color:var(--muted); font-weight:400; letter-spacing:.04em; text-transform:none}
  .dot{width:9px; height:9px}
  .rc{display:flex; flex-direction:column; gap:16px}
  svg{display:block; width:100%; height:auto; overflow:visible}
  .legend{display:flex; flex-wrap:wrap; gap:8px 12px; padding:10px 14px; font-family:var(--mono); font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted)}
  .legend span{display:inline-flex; align-items:center; gap:6px}
  .legend i{width:15px; height:15px; display:inline-flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; color:#0E0E10; font-style:normal}
  .gbreak{padding:12px 14px; display:flex; flex-direction:column; gap:10px}
  .gbrow .gtop{display:flex; justify-content:space-between; font-size:11.5px; margin-bottom:5px}
  .gbrow .gname{color:#DBDBE4; font-weight:600}
  .gbrow .gcount{font-family:var(--mono); color:var(--muted); font-weight:700}
  .gbrow .gbar{height:8px; background:#26262e; overflow:hidden}
  .gbrow .gfill{height:100%; background:var(--ch)}
  .tips{padding:12px 14px; font-size:11.5px; color:var(--muted); display:flex; flex-direction:column; gap:9px; line-height:1.5}
  .tips .t{display:flex; gap:9px; align-items:flex-start}
  .tips .t .n{color:var(--ch); font-family:var(--mono); font-weight:700}
  .pools{padding:14px}
  .pool{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 0; border-bottom:1px solid rgba(42,42,50,.7)}
  .pool:last-child{border-bottom:none}
  .pool .nm{font-weight:600; color:#fff; font-size:12.5px}
  .pool .av{font-family:var(--mono); font-weight:700; font-size:12.5px}
  .pool .bar{height:8px; background:#26262e; overflow:hidden; margin-top:6px}
  .pool .fill{height:100%}
  .pool .pct{font-family:var(--mono); font-size:10px; color:var(--muted); margin-top:4px; letter-spacing:.06em}
  .band{margin-top:18px; display:grid; grid-template-columns: 1fr 1.2fr 1.4fr; gap:16px}
  @media(max-width:1080px){ .band{grid-template-columns:1fr} }
  .band .card{padding:15px 16px}
  .band .cap{font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:#DBDBE4; font-weight:700; margin-bottom:10px}
  .band .cap::before{content:"// "; color:var(--ch)}
  .bpmflow{display:flex; align-items:center; gap:12px}
  .bpmflow .val{font-family:var(--disp); font-size:28px; font-weight:800; color:#fff; line-height:1}
  .bpmflow .val small{display:block; font-family:var(--mono); font-size:8.5px; letter-spacing:.12em; color:var(--muted); font-weight:700; margin-top:4px}
  .bpmflow .desc{font-size:11px; color:var(--muted); line-height:1.5}
  .vibes{display:flex; gap:14px; flex-wrap:wrap}
  .vibe{text-align:center; font-family:var(--mono); font-size:9px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); width:82px}
  .vibe .ic{width:42px; height:42px; margin:0 auto 7px; display:flex; align-items:center; justify-content:center; font-size:20px; background:var(--panel2); border:1px solid var(--line); color:var(--ch)}
  .djtips{font-size:11.5px; color:var(--muted); line-height:1.55}
  .djtips li{margin:5px 0}
  .djtips b{color:#CDCDD8}
  .footnote{text-align:left; color:var(--faint); font-family:var(--mono); font-size:10.5px; margin-top:18px; letter-spacing:.04em; line-height:1.6; border-top:1px solid var(--line); padding-top:16px}
  /* listen / preview */
  .listen{white-space:nowrap}
  .lbtns{display:inline-flex; gap:5px; align-items:center}
  .lbtn{display:inline-flex; align-items:center; justify-content:center; gap:5px; min-width:24px; height:24px; padding:0 7px; cursor:pointer; user-select:none; background:var(--panel2); border:1px solid var(--line); color:var(--muted); font-family:var(--mono); font-size:10px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; text-decoration:none}
  .lbtn:hover{border-color:var(--ch); color:var(--ink)}
  .lbtn.play.on{background:var(--ch); color:var(--on-ch); border-color:var(--ch)}
  .lbtn.busy{opacity:.55}
  .lbtn.dead{opacity:.4; cursor:default}
  .lbtn.sp:hover{border-color:#1DB954; color:#1DB954}
  .lbtn.am:hover{border-color:#FC3C44; color:#FC3C44}
  .tc-listen{margin-top:11px; display:flex; gap:6px; align-items:center; flex-wrap:wrap}
  .tc-listen .lbtn{height:32px; font-size:11px; padding:0 10px}
  .curvewrap{position:relative}
  .curve-cursor{position:absolute; top:0; bottom:0; width:1px; background:var(--ch); opacity:0; pointer-events:none}
  .curve-dot{position:absolute; width:9px; height:9px; background:var(--ch); border:1px solid var(--bg); opacity:0; pointer-events:none; transform:translate(-50%,-50%)}
  .curve-tip{position:absolute; z-index:20; min-width:150px; max-width:230px; padding:8px 10px; background:var(--panel2); border:1px solid var(--ch); color:var(--ink); font-size:11.5px; line-height:1.35; pointer-events:none; opacity:0; transform:translate(-50%,-115%); transition:opacity .08s ease}
  .curve-tip .tt-n{font-family:var(--mono); color:var(--muted); font-size:10px; letter-spacing:.08em; text-transform:uppercase}
  .curve-tip .tt-song{font-weight:800; color:#fff; margin:1px 0}
  .curve-tip .tt-art{color:var(--muted)}
  .curve-tip .tt-meta{margin-top:3px; color:var(--ch); font-weight:700; font-size:10.5px; font-family:var(--mono)}
  #nowbar{position:fixed; right:16px; bottom:16px; z-index:60; display:none; align-items:center; gap:12px; max-width:min(92vw,420px); padding:10px 12px; background:var(--panel2); border:1px solid var(--ch)}
  #nowbar.show{display:flex}
  #nowbar .np-btn{flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; background:var(--ch); color:var(--on-ch); border:0; cursor:pointer; font-size:14px; font-family:inherit}
  #nowbar .np-info{min-width:0; flex:1}
  #nowbar .np-song{font-family:var(--disp); font-weight:800; color:#fff; font-size:12.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  #nowbar .np-art{color:var(--muted); font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  #nowbar .np-prog{flex:none; width:70px; height:4px; background:var(--line); overflow:hidden}
  #nowbar .np-fill{height:100%; width:0; background:var(--ch)}
  #nowbar .np-x{flex:none; background:transparent; border:0; color:var(--muted); cursor:pointer; font-size:16px; line-height:1}
  @media (max-width:599px){ #nowbar{ bottom:calc(78px + env(safe-area-inset-bottom)); right:10px; left:10px; max-width:none } }
  /* responsive cards */
  html{scroll-behavior:smooth}
  .trackcards{display:none}
  #mnav{display:none}
  .card, .rc > .card, .two{scroll-margin-top:16px}
  .trk-list{display:flex; flex-direction:column; gap:12px; padding:14px}
  .tc-phase{display:flex; align-items:center; gap:8px; font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:#DFDFE7; margin:6px 2px 2px; padding-top:4px}
  .tc-phase:first-child{margin-top:0}
  .tc-phase small{color:var(--muted); font-weight:400; letter-spacing:.02em; text-transform:none}
  .tcard{background:var(--panel2); border:1px solid var(--line); border-left:4px solid var(--line); padding:12px 13px}
  .tc-top{display:flex; align-items:center; gap:11px}
  .tc-num{flex:none; width:30px; height:30px; display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-weight:700; font-size:14px; color:#0E0E10; font-variant-numeric:tabular-nums}
  .tc-title{flex:1 1 auto; min-width:0}
  .tc-song{font-family:var(--disp); font-weight:700; color:#fff; font-size:15px; line-height:1.15}
  .tc-song .apex,.tc-song .pick{font-size:12px}
  .tc-artist{color:#CDCDD8; font-size:12.5px; margin-top:2px}
  .tc-e{flex:none; text-align:right; font-family:var(--mono); font-weight:700; color:#fff; font-size:18px; line-height:1}
  .tc-e small{display:block; font-size:8px; letter-spacing:.12em; color:var(--muted); font-weight:700; margin-top:3px}
  .tc-meta{display:flex; align-items:center; flex-wrap:wrap; gap:8px 10px; margin-top:11px}
  .tc-energy{display:inline-flex; align-items:center; gap:6px; margin-left:auto}
  .tc-lines{margin-top:10px; display:flex; flex-direction:column; gap:5px}
  .tc-line{font-size:13px; color:#C9C9D4}
  .tc-line .k{display:inline-block; min-width:44px; color:var(--muted); font-family:var(--mono); font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase}
  @media (min-width:600px) and (max-width:1079px){
    .sheet{padding:16px 20px 40px}
    .tablewrap{display:none}
    .trackcards{display:block}
    .trk-list{display:grid; grid-template-columns:1fr 1fr; gap:12px}
    .rc{display:grid; grid-template-columns:1fr 1fr; gap:16px; align-items:start}
    #sec-pools{grid-column:1/-1}
    #mnav{display:flex; position:sticky; top:0; z-index:40; gap:8px; margin:0 0 16px; padding:8px; background:rgba(14,14,16,.9); backdrop-filter:blur(10px); border:1px solid var(--line)}
    #mnav a{flex:1; text-align:center; padding:12px 6px; font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:#CDCDD8; text-decoration:none; background:var(--panel); border:1px solid var(--line); min-height:44px; display:flex; align-items:center; justify-content:center}
    .card, .rc > .card{scroll-margin-top:74px}
  }
  @media (max-width:599px){
    body{font-size:16px}
    .sheet{max-width:100%; padding:14px 14px calc(78px + env(safe-area-inset-bottom))}
    .top{gap:12px; padding-top:16px}
    h1{font-size:clamp(30px,10vw,42px)}
    .subtitle{font-size:14px}
    .chips{gap:8px}
    .chip{flex:1 1 44%; min-width:0; padding:10px}
    .chip .big{font-size:17px}
    .phasenav{flex-wrap:nowrap; overflow-x:auto; margin:14px 0; padding-bottom:6px; -webkit-overflow-scrolling:touch; font-size:11px}
    .phasenav span{white-space:nowrap}
    .grid{grid-template-columns:1fr; gap:14px}
    .tablewrap{display:none}
    .trackcards{display:block}
    .trk-list{display:flex; flex-direction:column; gap:11px; padding:12px}
    .rc{gap:14px}
    .band{margin-top:14px}
    #mnav{display:flex; position:fixed; left:0; right:0; bottom:0; z-index:50; justify-content:space-around; gap:2px; padding:6px 6px calc(6px + env(safe-area-inset-bottom)); background:rgba(8,8,12,.95); backdrop-filter:blur(12px); border-top:1px solid var(--line)}
    #mnav a{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; min-height:52px; padding:6px 2px; color:var(--muted); text-decoration:none; font-family:var(--mono); font-size:9px; font-weight:700; letter-spacing:.06em; text-transform:uppercase}
    #mnav a .mi{font-size:18px; line-height:1; color:var(--ch)}
    .tips,.djtips,.legend,.gbreak{font-size:13px}
  }
</style>
</head>
<body>
<div class="sheet">
  <div class="mast">
    <a class="markwrap" href="../index.html">
      <canvas id="brandMark" class="mk" width="88" height="88" aria-label="Alpha Omega Collective"></canvas>
      <span class="mklab">Alpha Omega<br>Collective</span>
    </a>
    <a class="back" href="../index.html">← All gigs</a>
  </div>
  <div class="top">
    <div class="brand">
      <div class="kicker" id="kicker"></div>
      <h1 id="title"></h1>
      <div class="subtitle" id="subtitle"></div>
      <div class="giginfo" id="giginfo"></div>
    </div>
    <div class="chips" id="chips"></div>
  </div>
  <div class="phasenav" id="phasenav"></div>
  <nav id="mnav">
    <a href="#sec-tracks"><span class="mi">▤</span>Tracks</a>
    <a href="#sec-energy"><span class="mi">∿</span>Energy</a>
    <a href="#sec-genre"><span class="mi">◍</span>Genres</a>
    <a href="#sec-pools"><span class="mi">▦</span>Pools</a>
  </nav>
  <div class="grid">
    <div class="card" id="sec-tracks">
      <div class="tablewrap">
        <table>
          <thead><tr>
            <th>#</th><th>Song</th><th>Artist</th><th>Genre</th><th>Energy (1–10)</th><th>Phase</th><th>Role in Set</th><th>Transition Tip</th><th>Listen</th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div class="trackcards"><div class="trk-list" id="trklist"></div></div>
    </div>
    <div class="rc">
      <div class="card" id="sec-energy">
        <h3>Energy Curve</h3>
        <div class="curvewrap">
          <svg id="curve" viewBox="0 0 320 190" preserveAspectRatio="none"></svg>
          <div class="curve-cursor" id="curveCursor"></div>
          <div class="curve-dot" id="curveDot"></div>
          <div class="curve-tip" id="curveTip"></div>
        </div>
        <div class="legend" id="curvelegend"></div>
      </div>
      <div class="card" id="sec-genre">
        <h3>Genre Breakdown</h3>
        <div class="gbreak" id="gbreak"></div>
      </div>
      <div class="card">
        <h3>Transition Tips</h3>
        <div class="tips" id="transtips"></div>
      </div>
      <div class="card" id="sec-pools">
        <h3>Crate / Pool</h3>
        <div class="pools" id="pools"></div>
      </div>
    </div>
  </div>
  <div class="band">

/* energy curve */
(function(){
  var W=320,H=190,padL=26,padR=10,padT=16,padB=24;
  var ts=SET.tracks.slice().sort((a,b)=>a.n-b.n), n=ts.length;
  var xs=i=>padL+(W-padL-padR)*(i/(n-1));
  var ys=e=>padT+(H-padT-padB)*(1-e/10);
  var pts=ts.map((t,i)=>[xs(i),ys(t.energy)]);
  var line=(function(){var d='M'+pts[0][0].toFixed(1)+','+pts[0][1].toFixed(1);
    for(var i=0;i<pts.length-1;i++){var p0=pts[i-1]||pts[i],p1=pts[i],p2=pts[i+1],p3=pts[i+2]||p2;
      var c1x=p1[0]+(p2[0]-p0[0])/6,c1y=p1[1]+(p2[1]-p0[1])/6,c2x=p2[0]-(p3[0]-p1[0])/6,c2y=p2[1]-(p3[1]-p1[1])/6;
      d+='C'+c1x.toFixed(1)+','+c1y.toFixed(1)+' '+c2x.toFixed(1)+','+c2y.toFixed(1)+' '+p2[0].toFixed(1)+','+p2[1].toFixed(1);}return d;})();
  var area=line+'L'+pts[n-1][0].toFixed(1)+','+(H-padB)+'L'+pts[0][0].toFixed(1)+','+(H-padB)+'Z';
  var bands="",seen={};
  ts.forEach((t,i)=>{ if(seen[t.phase]===undefined) seen[t.phase]=i; });
  var keys=Object.keys(seen).map(Number).sort((a,b)=>a-b);
  keys.forEach((ph,k)=>{var s=seen[ph],e=(k<keys.length-1)?seen[keys[k+1]]:n;
    var x1=xs(s-0.5),x2=xs(e-0.5),xa=Math.max(padL,x1),xb=Math.min(W-padR,x2);
    bands+='<rect x="'+xa.toFixed(1)+'" y="'+(padT-6)+'" width="'+(xb-xa).toFixed(1)+'" height="'+(H-padT-padB+10)+'" fill="'+phaseById(ph).color+'" opacity=".10"/>';});
  var grid="",yl="";
  for(var e=0;e<=10;e+=2){var y=ys(e);grid+='<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="#2A2A32" stroke-width=".7" opacity=".6"/>';yl+='<text x="'+(padL-5)+'" y="'+(y+3)+'" text-anchor="end" font-size="7" fill="#63636F" font-family="monospace">'+e+'</text>';}
  var marks="";
  ts.forEach((t,i)=>{ if(t.tag==='apex'){var x=xs(i),y=ys(t.energy);marks+='<rect x="'+(x-4).toFixed(1)+'" y="'+(y-4).toFixed(1)+'" width="8" height="8" fill="'+phaseById(t.phase).color+'" stroke="#0E0E10" stroke-width="1.5"/>';}
    if(t.tag==='pick'){var x2=xs(i),y2=ys(t.energy);marks+='<rect x="'+(x2-3.4).toFixed(1)+'" y="'+(y2-3.4).toFixed(1)+'" width="6.8" height="6.8" fill="#0E0E10" stroke="'+phaseById(t.phase).color+'" stroke-width="1.6"/>';} });
  var stops=SET.phases.map((p,i)=>'<stop offset="'+Math.round(i/(SET.phases.length-1)*100)+'%" stop-color="'+p.color+'"/>').join('');
  var splitRange=r=>String(r||"").split(/[–-]/).map(s=>s.trim());
  var startLabel=(SET.phases[0]&&splitRange(SET.phases[0].time)[0])||"0:00";
  var lastRange=SET.phases[SET.phases.length-1]&&splitRange(SET.phases[SET.phases.length-1].time);
  var endLabel=(lastRange&&lastRange[1])||(lastRange&&lastRange[0])||"";
  document.getElementById('curve').innerHTML=
    '<defs><linearGradient id="cg" x1="0" y1="0" x2="1" y2="0">'+stops+'</linearGradient>'+
    '<linearGradient id="ca" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+GIG.chHex+'" stop-opacity=".26"/><stop offset="100%" stop-color="'+GIG.chHex+'" stop-opacity="0"/></linearGradient></defs>'+
    bands+grid+yl+
    '<path d="'+area+'" fill="url(#ca)"/>'+
    '<path d="'+line+'" fill="none" stroke="url(#cg)" stroke-width="2.4" stroke-linecap="square"/>'+
    marks+
    '<text x="'+padL+'" y="'+(H-6)+'" font-size="7" fill="#63636F" font-family="monospace">'+startLabel+'</text>'+
    '<text x="'+(W-padR)+'" y="'+(H-6)+'" text-anchor="end" font-size="7" fill="#63636F" font-family="monospace">'+endLabel+'</text>'+
    '<text x="10" y="'+(padT+2)+'" font-size="7" fill="#63636F" font-family="monospace" transform="rotate(-90 10 '+(padT+2)+')">Energy 1–10</text>';
  document.getElementById('curvelegend').innerHTML = SET.phases.map((p,i)=>
    '<span><i style="background:'+p.color+'">'+(i+1)+'</i>'+p.name+'</span>').join('');
})();

/* ΛΩ mark */
function drawMark(cv, size, hex){
  if(!cv || !cv.getContext) return;
  var ctx=cv.getContext('2d'); if(!ctx) return;
  cv.width=size; cv.height=size; ctx.clearRect(0,0,size,size);
  ctx.fillStyle="#0E0E10"; ctx.fillRect(0,0,size,size);
  var lw=Math.max(1,Math.round(size/32));
  ctx.strokeStyle=hex; ctx.lineWidth=lw;
  if(ctx.setLineDash) ctx.setLineDash([Math.max(2,size/16),Math.max(2,size/16)]);
  ctx.strokeRect(lw/2,lw/2,size-lw,size-lw);
  if(ctx.setLineDash) ctx.setLineDash([]);
  var f=Math.round(size*0.5);
  ctx.font='700 '+f+'px "Space Mono","Courier New",monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
  var cx=size/2, cy=size/2+size*0.03, off=Math.max(1,size/32);
  ctx.fillStyle="#00DCFF"; ctx.fillText('ΛΩ',cx-off,cy);
  ctx.fillStyle="#FF288F"; ctx.fillText('ΛΩ',cx+off,cy);
  ctx.fillStyle=hex; ctx.fillText('ΛΩ',cx,cy);
}
(function(){
  var hex=getComputedStyle(document.documentElement).getPropertyValue('--ch').trim()||GIG.chHex;
  function paint(){ drawMark(document.getElementById('brandMark'),88,hex);
    try{ var link=document.getElementById('favicon'), cv=document.createElement('canvas'); drawMark(cv,64,hex); if(link&&cv.toDataURL) link.href=cv.toDataURL('image/png'); }catch(e){} }
  paint(); if(document.fonts&&document.fonts.ready) document.fonts.ready.then(paint);
})();

/* preview engine */
function __aoSearchTerm(t){
  var song=String(t.song||'').replace(/\((?:extended|original|radio|clean|dirty|bootleg|edit|mashup|remix|feat[^)]*)[^)]*\)/ig,'').replace(/\s+/g,' ').trim();
  var art=String(t.artist||'').split(/\s+(?:vs\.?|ft\.?|feat\.?|&|x)\s+/i)[0].split(/[,(]/)[0].trim();
  return (art?art+' ':'')+(song||t.song);
}
(function(){
  var byN={}; (SET.tracks||[]).forEach(t=>{ byN[t.n]=t; });
  var cache={}, cbId=0, audio=new Audio(), curBtn=null, curN=null; audio.preload='none';
  var bar=document.createElement('div'); bar.id='nowbar';
  bar.innerHTML='<button class="np-btn" title="Play / pause">&#10074;&#10074;</button><div class="np-info"><div class="np-song"></div><div class="np-art"></div></div><div class="np-prog"><div class="np-fill"></div></div><button class="np-x" title="Stop">&#10005;</button>';
  document.body.appendChild(bar);
  var npBtn=bar.querySelector('.np-btn'), npSong=bar.querySelector('.np-song'), npArt=bar.querySelector('.np-art'), npFill=bar.querySelector('.np-fill');
  function jsonp(term){ return new Promise(function(res){
    var cb='__aoit'+(++cbId), sc=document.createElement('script');
    var to=setTimeout(function(){ done(null); },7000);
    function done(r){ try{delete window[cb];}catch(e){window[cb]=undefined;} if(sc.parentNode)sc.parentNode.removeChild(sc); clearTimeout(to); res(r); }
    window[cb]=function(data){ done(data&&data.results?data.results:[]); };
    sc.onerror=function(){ done(null); };
    sc.src='https://itunes.apple.com/search?media=music&entity=song&limit=6&term='+encodeURIComponent(term)+'&callback='+cb;
    document.body.appendChild(sc);
  });}
  async function resolve(t){
    var k=t.n; if(k in cache) return cache[k];
    var r=await jsonp(__aoSearchTerm(t));
    if(!r||!r.length){ r=await jsonp(String(t.song||'').replace(/\(.*?\)/g,'').trim()); }
    var hit=(r||[]).filter(x=>x.previewUrl)[0];
    cache[k]=hit?{url:hit.previewUrl, song:hit.trackName, art:hit.artistName}:null; return cache[k];
  }
  function setBtn(btn,state){ if(!btn) return; btn.classList.remove('busy','on','dead'); if(state) btn.classList.add(state);
    btn.innerHTML = state==='on' ? '&#10074;&#10074;' : (btn.closest('.tc-listen')? '&#9654; Preview':'&#9654;');
    if(state==='dead'){ btn.title='No preview found — use Spotify / Apple'; btn.innerHTML=btn.closest('.tc-listen')?'&#9654; n/a':'&#8212;'; } }
  function stop(){ audio.pause(); if(curBtn) setBtn(curBtn,''); curBtn=null; curN=null; bar.classList.remove('show'); }
  async function toggle(btn){
    var n=+btn.getAttribute('data-n'), t=byN[n]; if(!t) return;
    if(curN===n && !audio.paused){ audio.pause(); setBtn(btn,''); bar.classList.remove('show'); return; }
    if(curN===n && audio.paused && audio.src){ audio.play(); setBtn(btn,'on'); bar.classList.add('show'); return; }
    if(curBtn && curBtn!==btn) setBtn(curBtn,'');
    setBtn(btn,'busy'); curBtn=btn; curN=n;
    var hit=await resolve(t); if(curN!==n) return;
    if(!hit){ setBtn(btn,'dead'); curBtn=null; curN=null; return; }
    audio.src=hit.url; audio.currentTime=0; try{ await audio.play(); }catch(e){}
    setBtn(btn,'on'); npSong.textContent=t.song; npArt.textContent=t.artist||hit.art||''; npFill.style.width='0%'; bar.classList.add('show');
  }
  document.addEventListener('click', function(e){ var b=e.target.closest && e.target.closest('.lbtn.play'); if(!b) return; e.preventDefault(); toggle(b); });
  npBtn.addEventListener('click', function(){ if(audio.paused){ audio.play(); if(curBtn)setBtn(curBtn,'on'); } else { audio.pause(); if(curBtn)setBtn(curBtn,''); } });
  bar.querySelector('.np-x').addEventListener('click', stop);
  audio.addEventListener('timeupdate', function(){ if(audio.duration) npFill.style.width=(100*audio.currentTime/audio.duration)+'%'; });
  audio.addEventListener('ended', function(){ if(curBtn) setBtn(curBtn,''); npFill.style.width='100%'; bar.classList.remove('show'); curN=null; curBtn=null; });
})();

/* energy hover */
(function(){
  var wrap=document.querySelector('.curvewrap'); if(!wrap) return;
  var cursor=document.getElementById('curveCursor'), dot=document.getElementById('curveDot'), tip=document.getElementById('curveTip');
  var ts=SET.tracks.slice().sort((a,b)=>a.n-b.n), n=ts.length; if(n<2) return;
  var W=320,H=190,padL=26,padR=10,padT=16,padB=24;
  function fx(i){ return (padL+(W-padL-padR)*(i/(n-1)))/W; }
  function fy(e){ return (padT+(H-padT-padB)*(1-e/10))/H; }
  function idxFromX(cx){ var r=wrap.getBoundingClientRect(); var frac=(cx-r.left)/r.width; var i=Math.round(((frac*W-padL)/(W-padL-padR))*(n-1)); return Math.max(0,Math.min(n-1,i)); }
  function show(i){
    var r=wrap.getBoundingClientRect(), t=ts[i], ph=phaseById(t.phase);
    var px=fx(i)*r.width, py=fy(t.energy)*r.height;
    cursor.style.left=px+'px'; cursor.style.opacity='.55'; cursor.style.background=ph.color;
    dot.style.left=px+'px'; dot.style.top=py+'px'; dot.style.opacity='1'; dot.style.background=ph.color;
    tip.style.borderColor=ph.color;
    tip.innerHTML='<div class="tt-n">#'+t.n+' &middot; '+escAttr(ph.name)+'</div><div class="tt-song">'+escAttr(t.song)+'</div><div class="tt-art">'+escAttr(t.artist||'')+'</div><div class="tt-meta">'+escAttr(t.genre||'')+' &middot; E'+t.energy+'</div>';
    tip.style.opacity='1';
    var th=tip.offsetHeight, tw=tip.offsetWidth, below=(py - th - 14) < 0;
    tip.style.transform = below ? 'translate(-50%,14px)' : 'translate(-50%,-115%)';
    tip.style.top = (below ? py+10 : py-8) + 'px';
    tip.style.left = Math.min(Math.max(px, tw/2+4), r.width-tw/2-4)+'px';
  }
  function hide(){ cursor.style.opacity='0'; dot.style.opacity='0'; tip.style.opacity='0'; }
  wrap.style.cursor='crosshair';
  wrap.addEventListener('mousemove', e=>show(idxFromX(e.clientX)));
  wrap.addEventListener('mouseleave', hide);
  wrap.addEventListener('touchstart', e=>{ if(e.touches[0]) show(idxFromX(e.touches[0].clientX)); },{passive:true});
  wrap.addEventListener('touchmove', e=>{ if(e.touches[0]) show(idxFromX(e.touches[0].clientX)); },{passive:true});
  wrap.addEventListener('touchend', ()=>setTimeout(hide,1600));
})();
</script>
